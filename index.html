<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Buzz Finder — Scanner de vidéos</title>
<meta name="description" content="Détecte les vidéos YouTube en forte croissance, prêtes à cliper." />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#10131A" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Buzz Finder" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="scan-line" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true"></span>
    <div class="brand-text">
      <span class="eyebrow">Scanner en direct</span>
      <h1>Buzz&nbsp;Finder</h1>
    </div>
  </div>
  <button id="settings-toggle" class="icon-btn" aria-label="Paramètres" aria-expanded="false">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="3.2"/>
      <path d="M19.4 13a7.6 7.6 0 0 0 0-2l2-1.5-2-3.5-2.4.7a7.6 7.6 0 0 0-1.7-1L14.8 3h-4l-.5 2.7a7.6 7.6 0 0 0-1.7 1l-2.4-.7-2 3.5L6 11a7.6 7.6 0 0 0 0 2l-2 1.5 2 3.5 2.4-.7a7.6 7.6 0 0 0 1.7 1l.5 2.7h4l.5-2.7a7.6 7.6 0 0 0 1.7-1l2.4.7 2-3.5-2-1.5Z"/>
    </svg>
  </button>
</header>

<main>

  <section id="settings-panel" class="panel settings-panel" hidden>
    <label class="field">
      <span>Clé API YouTube Data v3</span>
      <input type="password" id="api-key" placeholder="AIzaSy…" autocomplete="off" spellcheck="false" />
    </label>
    <p class="hint">Stockée uniquement dans ton navigateur (localStorage). Jamais envoyée ailleurs qu'à l'API YouTube officielle.</p>
    <a class="hint-link" href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener">Obtenir une clé API →</a>
  </section>

  <section class="panel scan-form">
    <label class="field">
      <span>Sujet / mot-clé</span>
      <input type="text" id="query" placeholder="ex : gaming clutch, interview, vulgarisation…" />
    </label>

    <div class="field-row">
      <label class="field">
        <span>Région</span>
        <select id="region">
          <option value="FR" selected>France</option>
          <option value="BE">Belgique</option>
          <option value="CH">Suisse</option>
          <option value="CA">Canada</option>
          <option value="US">États-Unis</option>
          <option value="GB">Royaume-Uni</option>
        </select>
      </label>

      <label class="field">
        <span>Durée min.</span>
        <select id="min-duration">
          <option value="120">2 min</option>
          <option value="180" selected>3 min</option>
          <option value="300">5 min</option>
          <option value="600">10 min</option>
        </select>
      </label>
    </div>

    <button id="scan-btn" class="primary-btn">
      <span class="btn-label">Scanner le buzz</span>
      <span class="btn-pulse" aria-hidden="true"></span>
    </button>
  </section>

  <section id="status" class="status" role="status" aria-live="polite"></section>

  <section id="results" class="results"></section>

</main>

<template id="result-card-tpl">
  <article class="card">
    <div class="card-rank"></div>
    <div class="card-body">
      <h2 class="card-title"></h2>
      <p class="card-channel"></p>

      <div class="meter" title="Intensité du buzz">
        <div class="meter-fill"></div>
      </div>

      <dl class="card-stats">
        <div><dt>Vues</dt><dd class="stat-views"></dd></div>
        <div><dt>Vélocité</dt><dd class="stat-velocity"></dd></div>
        <div><dt>Durée</dt><dd class="stat-duration"></dd></div>
        <div><dt>Engagement</dt><dd class="stat-engagement"></dd></div>
      </dl>

      <a class="card-link" target="_blank" rel="noopener">Voir sur YouTube →</a>
    </div>
  </article>
</template>

<script src="app.js"></script>
</body>
</html>
